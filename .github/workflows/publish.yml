name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing + provenance (Sigstore OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # No NODE_AUTH_TOKEN: authentication and provenance are handled via the
      # OIDC trusted publisher configured for this package on npmjs.com.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

  release-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to upload assets to the GitHub release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Build standalone binaries
        run: scripts/buildBinaries.sh "${{ github.event.release.tag_name }}"

      - name: Upload binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" release-binaries/* --clobber
